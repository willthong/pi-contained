name: Build and push container image
on: 
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute next version
        id: svu
        run: |
          wget -q https://github.com/caarlos0/svu/releases/download/v3.4.1/svu_3.4.1_linux_amd64.tar.gz
          tar -xzf svu_3.4.1_linux_amd64.tar.gz
          chmod +x svu
          echo "version=$(./svu next)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ghcr.io/willthong/pi-contained:${{ steps.svu.outputs.version }}
            ghcr.io/willthong/pi-contained:latest
